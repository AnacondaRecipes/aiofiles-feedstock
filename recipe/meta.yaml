{% set name = "aiofiles" %}
{% set version = "25.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: a8d728f0a29de45dc521f18f07297428d56992a742f0cd2701ba86e44d23d5b2

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  skip: true  # [py<38]

requirements:
  host:
    - python
    - pip
    - hatchling
  run:
    - python

test:
  source_files:
    - tests
  imports:
    - aiofiles
  commands:
    - pip check
    - pytest -v --asyncio-mode=auto tests
  requires:
    - pip
    - pytest >=8.2.2
    - pytest-asyncio >=0.23.7

about:
  home: https://github.com/Tinche/aiofiles
  summary: File support for asyncio
  description: syaiofiles is an Apache2 licensed library, written in Python, for handling local disk files in asyncio applications.
  license: Apache-2.0
  license_file: LICENSE
  license_family: Apache
  dev_url: https://github.com/Tinche/aiofiles
  doc_url: https://github.com/Tinche/aiofiles/blob/main/README.md

extra:
  recipe-maintainers:
    - kszucs
    - carlodri
